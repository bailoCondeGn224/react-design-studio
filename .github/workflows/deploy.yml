name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Contabo
        uses: appleboy/ssh-action@master
        with:
          host: 161.97.136.168
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cp /opt/gestion-boutique/frontend/.env /tmp/frontend.env
            cd /opt/gestion-boutique/frontend
            git pull origin main
            cp /tmp/frontend.env /opt/gestion-boutique/frontend/.env
            cd /opt/gestion-boutique
            docker compose build --no-cache frontend
            docker compose up -d frontend